name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release exe
        run: cargo build --release

      - name: Compute SHA-256
        id: hash
        shell: pwsh
        run: |
          $h = (Get-FileHash target/release/disbatch.exe -Algorithm SHA256).Hash
          "sha256=$h" >> $env:GITHUB_OUTPUT
          Write-Host "disbatch.exe SHA-256: $h"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/disbatch.exe
          body: |
            **Disbatch** — point it at a PowerShell or `.bat` script and it generates a
            GUI, statically analyses it for risky behaviour, and runs it in an embedded
            terminal with a progress bar.

            > ⚠️ **"Vibecoded"** — built fast as a personal project and lightly tested.
            > The built-in risk scanner is a heuristic aid, **not** antivirus.

            The `disbatch.exe` download is **unsigned**, so Windows SmartScreen may say
            *"Windows protected your PC"* — click **More info → Run anyway**.

            **Verify your download.** The SHA-256 of `disbatch.exe` in this release is:

            ```
            ${{ steps.hash.outputs.sha256 }}
            ```

            Check it on your machine and only run it if it matches:

            ```powershell
            (Get-FileHash .\disbatch.exe -Algorithm SHA256).Hash
            ```
